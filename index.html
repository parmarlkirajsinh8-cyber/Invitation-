<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>janviba ❤️ jayrajsinh Wedding</title>
  <link rel="stylesheet" href="style.css">
  <style>
  body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #fff5f8;
  text-align: center;
}

.hero {
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  padding: 100px 20px;
  animation: fadeIn 2s;
}

.details, .countdown, .gallery, .rsvp {
  padding: 40px;
}

.gallery img {
  width: 200px;
  margin: 10px;
  border-radius: 15px;
  transition: transform 0.3s;
}

.gallery img:hover {
  transform: scale(1.1);
}

input {
  padding: 10px;
  margin: 10px;
  width: 200px;
}

button {
  padding: 12px 25px;
  background: #e91e63;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

button:hover {
  background: #c2185b;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
  </style>
</head>
<body>

  <!-- 🎵 Background Music -->
  <audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- 💕 Hero Section -->
  <section class="hero">
    <h1>You're Invited</h1>
    <h2>janviba ❤ jayrajsinh</h2>
    <p>We are getting married!</p>
  </section>

  <!-- 💍 Details -->
  <section class="details">
    <p><strong>Date:</strong> 23/01/2027 && 24/01/2027</p>
    <p><strong>Venue:</strong> PARMAR FAMILY GODAVARI</p>
  </section>

  <!-- ⏳ Countdown -->
  <section class="countdown">
    <h3>Countdown</h3>
    <p id="timer"></p>
  </section>

  <!-- 🖼️ Gallery -->
  <section class="gallery">
    <h3>Our Moments</h3>
    <div class="images">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
      <img src="image4.jpg">
      <img src="image5.jpg">
      <img src="image6.jpg">
      <img src="image7.jpg">
      <img src="image8.jpg">
    </div>
  </section>
  <h3>
    <mark>welcome</mark>
  </h3>

  <script src="invite.js"></script>
</body>
</html>
